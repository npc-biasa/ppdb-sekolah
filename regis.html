<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrasi PPDB Online</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: linear-gradient(135deg, #fce4ec 0%, #f06292 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>
<body class="p-6">

    <div class="bg-white/90 backdrop-blur-sm shadow-2xl rounded-2xl p-8 w-full max-w-lg border border-pink-100">
        <!-- Header -->
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-pink-600">Registrasi PPDB</h1>
            <p class="text-pink-400 text-sm">Tahun Ajaran 2026/2027</p>
            <div class="h-1 w-20 bg-pink-500 mx-auto mt-2 rounded-full"></div>
        </div>

        <!-- Form -->
        <form action="#" method="POST" class="space-y-5">
            
            <!-- Nama Lengkap -->
            <div>
                <label class="block text-sm font-semibold text-pink-700 mb-1">Nama Lengkap</label>
                <input type="text" placeholder="Masukkan nama sesuai ijazah" 
                    class="w-full px-4 py-2 border border-pink-200 rounded-lg focus:ring-2 focus:ring-pink-400 focus:outline-none transition">
            </div>

            <!-- NISN & Email -->
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-semibold text-pink-700 mb-1">NISN</label>
                    <input type="number" placeholder="10 digit NISN" 
                        class="w-full px-4 py-2 border border-pink-200 rounded-lg focus:ring-2 focus:ring-pink-400 focus:outline-none transition">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-pink-700 mb-1">Jenis Kelamin</label>
                    <select class="w-full px-4 py-2 border border-pink-200 rounded-lg focus:ring-2 focus:ring-pink-400 focus:outline-none transition">
                        <option value="">Pilih...</option>
                        <option value="L">Laki-laki</option>
                        <option value="P">Perempuan</option>
                    </select>
                </div>
            </div>

            <!-- Asal Sekolah -->
            <div>
                <label class="block text-sm font-semibold text-pink-700 mb-1">Asal Sekolah</label>
                <input type="text" placeholder="Nama sekolah sebelumnya" 
                    class="w-full px-4 py-2 border border-pink-200 rounded-lg focus:ring-2 focus:ring-pink-400 focus:outline-none transition">
            </div>

            <!-- Email -->
            <div>
                <label class="block text-sm font-semibold text-pink-700 mb-1">Email Aktif</label>
                <input type="email" placeholder="contoh:andin@email.com" 
                    class="w-full px-4 py-2 border border-pink-200 rounded-lg focus:ring-2 focus:ring-pink-400 focus:outline-none transition">
            </div>

            <!-- Tombol Submit -->
            <button type="submit" 
                class="w-full bg-pink-500 hover:bg-pink-600 text-white font-bold py-3 rounded-xl shadow-lg transform hover:scale-[1.02] transition-all duration-200 mt-4">
                Daftar Sekarang
            </button>

        </form>

        <!-- Footer Form -->
        <p class="text-center text-xs text-pink-400 mt-6">
            Sudah punya akun? <a href="#" class="font-bold underline">Login di sini</a>
        </p>
    </div>

</body>
</html>
